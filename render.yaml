services:
  - type: web
    name: finesse-api
    runtime: node
    plan: free
    # Build at the repo root so the @printflow/shared workspace links and is compiled first.
    # --include=dev: NODE_ENV=production makes npm omit devDeps, but the build needs
    # typescript + @types, so force them in. (Runtime only needs prod deps.)
    buildCommand: npm install --include=dev && npm run build -w @printflow/shared && npm run build -w @printflow/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # Auto-generated secret used to sign staff app tokens.
      - key: APP_AUTH_SECRET
        generateValue: true
      # Public URL of the deployed web app (used in SMS/email links). Update after the Vercel deploy.
      - key: PUBLIC_WEB_URL
        value: https://your-web-app.vercel.app
      # NOTE: free plan has no persistent disk, so the local file store resets on each
      # deploy/restart. Connect Supabase (below) for durable data.
      # ---- Optional integrations: add in the Render dashboard when available ----
      # - key: SUPABASE_URL
      #   sync: false
      # - key: SUPABASE_SERVICE_ROLE_KEY
      #   sync: false
      # - key: PAYFAST_MERCHANT_ID
      #   sync: false
      # - key: PAYFAST_MERCHANT_KEY
      #   sync: false
      # - key: PAYFAST_PASSPHRASE
      #   sync: false
      # - key: YOCO_SECRET_KEY
      #   sync: false
      # - key: YOCO_WEBHOOK_SECRET
      #   sync: false
